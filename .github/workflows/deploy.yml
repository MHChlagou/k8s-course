name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Slidev
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: pnpm run build

      - name: Encrypt with staticrypt
        env:
          STATICRYPT_PASSPHRASE: ${{ secrets.STATICRYPT_PASSPHRASE }}
        run: |
          if [ -z "$STATICRYPT_PASSPHRASE" ]; then
            echo "::error::Missing STATICRYPT_PASSPHRASE repository secret"
            exit 1
          fi
          pnpm run encrypt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-protected

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
